<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Rahul</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
overflow:hidden;
}

/* pages */

.page{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
transition:1s;
}

/* page1 */

#page1{
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

#page1 h1{
font-size:35px;
margin-bottom:20px;
animation:fade 2s infinite alternate;
}

@keyframes fade{
from{opacity:0.5}
to{opacity:1}
}

#page1 button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ffd700;
cursor:pointer;
font-size:16px;
}

/* page2 */

#page2{
background:linear-gradient(#0f2027,#203a43,#2c5364);
color:white;
opacity:0;
pointer-events:none;
}

/* active */

.active{
opacity:1 !important;
pointer-events:auto !important;
}

/* moon */

.moon{
position:absolute;
top:40px;
right:30px;
width:70px;
height:70px;
background:#ffd700;
border-radius:50%;
box-shadow:0 0 30px #ffd700;
}

/* container */

.container{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
text-align:center;
width:90%;
max-width:400px;
}

/* image */

.profile-img{
width:110px;
height:110px;
margin:auto;
border-radius:50%;
overflow:hidden;
border:3px solid #ffd700;
}

.profile-img img{
width:100%;
height:100%;
object-fit:cover;
}

h1{
color:#ffd700;
margin-top:10px;
}

/* buttons */

button{
padding:10px 20px;
margin:8px;
border:none;
border-radius:25px;
background:#ffd700;
cursor:pointer;
}

/* typing effect */

#message{
margin-top:15px;
min-height:40px;
}

/* gift */

#gift{
font-size:60px;
display:none;
animation:bounce 1s infinite;
}

@keyframes bounce{
50%{transform:translateY(-10px)}
}

/* stars */

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h1>🌙 Eid Mubarak 🌙</h1>
<p>Click below for surprise</p>
<br>
<button onclick="openPage()">Enter</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

<div class="moon"></div>

<div class="container">

<div class="profile-img">
<img src="./fff.jpeg">
</div>

<h1>Eid Mubarak</h1>

<p>Mere pyare dost ke liye ❤️</p>

<button onclick="wish()">Open Wish</button>
<button onclick="dua()">Dua 🤲</button>
<button onclick="surprise()">Surprise 🎁</button>

<p id="message"></p>

<div id="gift">🎁</div>

<p style="margin-top:10px;color:#ffd700;">Rahul ke taraf se</p>

</div>
</div>

<script>

/* page switch */

function openPage(){
document.getElementById("page1").style.opacity="0";
setTimeout(()=>{
document.getElementById("page1").style.display="none";
document.getElementById("page2").classList.add("active");
},500);
}

/* stars */

for(let i=0;i<60;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";
document.body.appendChild(star);
}

/* typing effect */

function typeText(text){
let i=0;
let speed=40;
let msg=document.getElementById("message");
msg.innerHTML="";

function typing(){
if(i<text.length){
msg.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,speed);
}
}
typing();
}

/* buttons */

function wish(){
typeText("Eid Mubarak! Allah tumhari zindagi khushiyon se bhar de ✨");
}

function dua(){
typeText("Allah tumhe success, health aur happiness de. Ameen 🤲");
}

function surprise(){
document.getElementById("gift").style.display="block";
typeText("🎉 Surprise! Aaj tumhe Biryani milega mere trf se hai 😄");
fireworks();
}

/* fireworks */

function fireworks(){
for(let i=0;i<20;i++){
let fw=document.createElement("div");
fw.innerHTML="🎆";
fw.style.position="absolute";
fw.style.left=Math.random()*100+"%";
fw.style.top=Math.random()*80+"%";
document.body.appendChild(fw);

setTimeout(()=>fw.remove(),1000);
}
}

</script>

</body>
</html>
